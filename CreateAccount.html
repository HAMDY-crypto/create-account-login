<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <link href="Log In.html">
    <link href="styles.css">
</head>
<body style="background-color: rgb(132, 132, 132); text-align: center;">

    <div>
        <h2 title="This page is for creating a new account only">Create Account</h2>

        <form method="post" >
            <input type="text" id="name" placeholder="Full Name" required><br><br>
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="password" placeholder="Password" required><br><br>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required><br><br>

            <button type="submit">Sign Up</button>
        </form>

        <div>
            <p>Already have an account? <a href="Log In.html" title="if you wish to log in to your existing account">Log in</a></p>
        </div>
    </div>
</body>
</html>
